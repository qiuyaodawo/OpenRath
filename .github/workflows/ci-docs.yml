name: Docs

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'pyproject.toml'
      - 'uv.lock'
      - 'README*.md'
      - 'CONTRIBUTING.md'
  pull_request:
    branches: [main]
    paths:
      - 'docs/**'
      - 'pyproject.toml'
      - 'uv.lock'
      - 'README*.md'
      - 'CONTRIBUTING.md'

permissions:
  contents: read

jobs:
  build-docs:
    name: Build Docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: '3.12'
      - run: uv sync --group dev --group docs --frozen
      - run: uv run sphinx-build -M html docs/source docs/_build -W
