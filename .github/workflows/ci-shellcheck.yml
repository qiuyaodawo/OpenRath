name: ShellCheck

on:
  push:
    branches: [main]
    paths:
      - 'scripts/*.sh'
      - '.shellcheckrc'
  pull_request:
    branches: [main]
    paths:
      - 'scripts/*.sh'
      - '.shellcheckrc'

permissions:
  contents: read

jobs:
  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: './scripts'
        env:
          SHELLCHECK_OPTS: -x
