name: Test Fast

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'tests/**'
      - 'example/**'
      - 'pyproject.toml'
      - 'pytest.ini'
      - 'uv.lock'
      - '.python-version'
  pull_request:
    branches: [main]
    paths:
      - 'src/**'
      - 'tests/**'
      - 'example/**'
      - 'pyproject.toml'
      - 'pytest.ini'
      - 'uv.lock'
      - '.python-version'

permissions:
  contents: read

jobs:
  # PR path: only the lifecycle boundary versions (lowest supported + highest
  # supported). Cuts PR CI minutes ~50% while still catching syntax/typing
  # divergence at both ends; the full matrix runs on push-to-main below.
  test-fast-pr:
    if: github.event_name == 'pull_request'
    name: pytest (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.13']
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: uv sync --dev --frozen
      - run: uv run pytest -n auto -m 'not opensandbox and not openviking and not live_llm'

  # main path: full matrix on every push, so regressions in the middle
  # versions still get caught before the next release cycle.
  test-fast-main:
    if: github.event_name == 'push'
    name: pytest (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.11', '3.12', '3.13']
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: uv sync --dev --frozen
      - run: uv run pytest -n auto -m 'not opensandbox and not openviking and not live_llm'
