name: Test OpenSandbox

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'src/rath/backend/**'
      - 'src/rath/session/**'
      - 'tests/backends/**'
      - 'tests/conformance/**'
      - 'tests/session/**'
      - 'pyproject.toml'
      - 'uv.lock'
  pull_request:
    branches: [main]
    paths:
      - 'src/rath/backend/**'
      - 'src/rath/session/**'
      - 'tests/backends/**'
      - 'tests/conformance/**'
      - 'tests/session/**'
      - 'pyproject.toml'
      - 'uv.lock'

permissions:
  contents: read

jobs:
  test-opensandbox:
    name: pytest (opensandbox)
    runs-on: ubuntu-latest
    # OpenSandbox tests require a running server; allow failure in PRs
    # until the CI environment is verified stable.
    continue-on-error: ${{ github.event_name == 'pull_request' }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: '3.12'
          # setup-uv's post-job "Pruning cache" step has been hanging for
          # 5+ minutes (timed-out exit 2) on this workflow even though the
          # test run itself finishes green; skip the prune to keep the
          # job from failing on cleanup.
          prune-cache: false
      - name: Install OpenSandbox dependencies
        run: uv sync --extra opensandbox --frozen
      - name: Init OpenSandbox config
        run: |
          export OPENSANDBOX_INSECURE_SERVER=YES
          uv run opensandbox-server init-config --example docker .sandbox.toml
      - name: Pre-pull sandbox image
        run: docker pull opensandbox/code-interpreter:v1.0.2
      - name: Start OpenSandbox server
        run: |
          export OPENSANDBOX_INSECURE_SERVER=YES
          uv run opensandbox-server --config .sandbox.toml &
          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:8080/health >/dev/null 2>&1; then
              echo "OpenSandbox server ready"
              exit 0
            fi
            echo "Waiting for OpenSandbox server... ($i/30)"
            sleep 2
          done
          echo "OpenSandbox server failed to start" >&2
          exit 1
      - name: Run OpenSandbox tests
        # Backend tests hit a real Docker daemon; the server can race
        # stdout capture against exit_code on small jobs. Allow each
        # test up to 2 reruns to ride out transient infra flakes
        # (pytest-rerunfailures is a dev dep).
        run: uv run pytest -m opensandbox --reruns 2 --reruns-delay 2
