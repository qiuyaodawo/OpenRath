[mypy]
python_version = 3.10
mypy_path = src:example
packages = rath
strict = True
warn_unused_configs = True
show_error_codes = True
pretty = True

[mypy-rath.backend.opensandbox]
# Heavy optional-SDK boundary: stubs and union returns lag behind runtime.
ignore_errors = True

[mypy-openviking]
ignore_missing_imports = True

[mypy-openviking_cli.exceptions]
ignore_missing_imports = True
